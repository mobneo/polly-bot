services:
  polymarket-cli:
    build: .
    container_name: polymarket-cli
    env_file:
      - .env
    environment:
      - POLYMARKET_PRIVATE_KEY=${POLYMARKET_PRIVATE_KEY}
      - POLYMARKET_SIGNATURE_TYPE=${POLYMARKET_SIGNATURE_TYPE:-proxy}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - polymarket-config:/root/.config/polymarket
      - ./scripts:/scripts:ro
    stdin_open: true
    tty: true

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: telegram-bot
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - AUTHORIZED_USER_IDS=${AUTHORIZED_USER_IDS}
      - ALLOW_ALL_USERS=${ALLOW_ALL_USERS:-false}
    restart: unless-stopped
    depends_on:
      - polymarket-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  polymarket-config:
